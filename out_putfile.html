<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Tkinter Example App</title>
<style>
body{font-family:Arial,sans-serif;margin:24px}
.app{max-width:420px;padding:16px;border:1px solid #ccc;border-radius:12px}
.row{margin:10px 0}
input,button{font-size:14px;padding:8px}
button{margin-right:8px}
.error{color:#b00020;margin-top:10px}
</style>
</head>
<body>
<div class="app"><h2>Tkinter Example App</h2>
<div class="row">Enter your name:</div>
<input class="row" id="name_entry" type="text">
<button id="greet_button">Greet</button>
<button id="clear_button">Clear</button>
<div class="error" id="error"></div>
</div>
<script>
const $ = (id) => document.getElementById(id);
function setResult(text){
  const out = document.querySelector('.result');
  if (out) out.textContent = text;
}
</script>
</body>
</html>
